<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>选择对话模式 - MindLink</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              "slate-850": "#151d2e",
            },
            boxShadow: {
              "glow-sky":
                "0 0 15px rgba(56, 189, 248, 0.3), 0 0 25px rgba(56, 189, 248, 0.2)",
            },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="../css/styles.css" />
    <script src="../assets/data/mentors.js" defer></script>
    <script src="../js/components/conversation-setup.js" defer></script>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧠</text></svg>"
    />
  </head>
  <body class="bg-gray-50 text-gray-900 min-h-screen">
    <div class="flex min-h-screen">
      <!-- Sidebar -->
      <aside
        class="bg-white w-72 border-r border-gray-200 hidden md:flex flex-col fixed top-0 left-0 h-full z-20"
      >
        <div class="p-6 border-b border-gray-200">
          <div class="flex items-center">
            <h1 class="text-xl font-semibold text-gray-900">MindLink</h1>
          </div>
        </div>
        <nav class="p-6 space-y-2 flex-grow">
          <a
            href="dashboard.html"
            class="group flex items-center px-4 py-3 rounded-lg text-gray-600 hover:bg-gray-50 hover:text-gray-900 transition-colors"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-5 w-5 mr-3"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"
              />
            </svg>
            学习导师
          </a>
          <a
            href="manual.html"
            class="group flex items-center px-4 py-3 rounded-lg text-gray-600 hover:bg-gray-50 hover:text-gray-900 transition-colors"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-5 w-5 mr-3"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"
              />
            </svg>
            学习提问手册
          </a>
        </nav>
        <div class="p-6 border-t border-gray-200">
          <a
            href="index.html"
            class="group flex items-center px-4 py-3 rounded-lg text-gray-600 hover:bg-gray-50 hover:text-gray-900 transition-colors"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-5 w-5 mr-3"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"
              />
            </svg>
            退出登录
          </a>
        </div>
      </aside>
      <!-- Main Content -->
      <main class="flex-1 md:ml-72 p-6 md:p-8">
        <!-- Mobile Header -->
        <div
          class="bg-white shadow-sm p-4 md:hidden flex items-center justify-between sticky top-0 z-10 border-b border-gray-200"
        >
          <div class="flex items-center">
            <h1 class="text-xl font-semibold text-gray-900">MindLink</h1>
          </div>
          <button
            id="mobile-menu-button"
            class="text-gray-600 hover:text-gray-900"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-6 w-6"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M4 6h16M4 12h16M4 18h16"
              />
            </svg>
          </button>
        </div>
        <!-- Mobile Menu (collapsible, under mobile header) -->
        <div
          id="mobile-menu"
          class="bg-white p-4 hidden md:hidden border-b border-gray-200"
        >
          <nav class="space-y-2">
            <a
              href="dashboard.html"
              class="group flex items-center px-3 py-2 rounded-lg text-gray-600 hover:bg-gray-50 hover:text-gray-900 transition-colors text-sm"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="h-5 w-5 mr-2"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"
                />
              </svg>
              学习导师
            </a>
            <a
              href="manual.html"
              class="group flex items-center px-3 py-2 rounded-lg text-gray-600 hover:bg-gray-50 hover:text-gray-900 transition-colors text-sm"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="h-5 w-5 mr-2"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"
                />
              </svg>
              学习提问手册
            </a>
            <a
              href="index.html"
              class="group flex items-center px-3 py-2 rounded-lg text-gray-600 hover:bg-gray-50 hover:text-gray-900 transition-colors text-sm"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="h-5 w-5 mr-2"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"
                />
              </svg>
              退出登录
            </a>
          </nav>
        </div>
        <div class="max-w-3xl mx-auto">
          <h2 class="text-3xl font-bold text-gray-900 mb-2">选择对话模式</h2>
          <p class="text-gray-600 mb-8">
            您即将与 AI 导师开始对话。请选择您希望的沟通方式。
          </p>
          <div
            id="initial-mentor-info"
            class="cool-card p-6 mb-8 flex items-center space-x-4"
          >
            <!-- Initial mentor info will be populated here -->
            <div class="text-center text-gray-500 italic p-4">
              正在加载导师信息...
            </div>
          </div>
          <div class="grid md:grid-cols-2 gap-6 mb-8">
            <button
              id="one-on-one-chat-btn"
              class="btn-primary w-full py-4 text-lg flex flex-col items-center justify-center cool-card-hover"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="h-10 w-10 mb-2"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
                stroke-width="2"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"
                />
              </svg>
              1v1 单独对话
              <span class="text-xs font-normal text-gray-200 mt-1"
                >与导师进行深度交流</span
              >
            </button>
            <button
              id="round-table-setup-btn"
              class="btn-secondary w-full py-4 text-lg flex flex-col items-center justify-center cool-card-hover"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="h-10 w-10 mb-2"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
                stroke-width="2"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.653-.08-.986-.234-1.253A4.507 4.507 0 0018 15V9c0-1.657-1.343-3-3-3h-2M7 15v5m0 0v-5m0 0H3v-2a3 3 0 015.356-1.857M7 15H7M3 12h4M3 8h4m-4 4h.01M12 3h.01M12 6h.01M12 9h.01M12 12h.01M12 15h.01"
                />
              </svg>
              圆桌多人研讨
              <span class="text-xs font-normal text-gray-600 mt-1"
                >邀请多位导师共同探讨</span
              >
            </button>
          </div>
          <div id="round-table-config" class="hidden cool-card p-6 md:p-8">
            <h3 class="text-2xl font-semibold text-gray-900 mb-2">
              配置圆桌讨论
            </h3>
            <p class="text-gray-600 mb-6">
              选择您希望加入圆桌的导师。首位导师已默认选定，您最多可以选择
              <span id="max-additional-mentors">3</span>
              位额外导师。
            </p>
            <div class="mb-6">
              <h4 class="text-lg font-medium text-gray-800 mb-2">已选导师:</h4>
              <div
                id="selected-mentors-display"
                class="flex flex-wrap gap-3 items-center p-3 bg-gray-100 rounded-lg border border-gray-300 min-h-[50px]"
              >
                <!-- Selected mentors' avatars will appear here -->
              </div>
            </div>
            <h4 class="text-lg font-medium text-gray-800 mb-3">
              可选导师列表:
            </h4>
            <div
              id="available-mentors-list"
              class="space-y-3 max-h-96 overflow-y-auto pr-2 custom-scrollbar"
            >
              <!-- Available mentors for selection will be populated here -->
              <p class="text-gray-500">正在加载导师列表...</p>
            </div>
            <div class="mt-8 flex justify-end space-x-4">
              <button id="cancel-round-table-btn" class="btn-secondary">
                取消
              </button>
              <button
                id="start-round-table-chat-btn"
                class="btn-primary shadow-glow-sky"
              >
                开始圆桌对话 (<span id="selected-mentor-count">1</span>
                /4)
              </button>
            </div>
          </div>
        </div>
      </main>
    </div>
  </body>
</html>
